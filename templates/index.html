<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escolar</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Sistema de Cadastro de Alunos (Excel)</h1>

        <!-- Formulário de Cadastro -->
        <div class="card">
            <h2>Cadastrar Aluno</h2>
            <form id="form-cadastro">
                <input type="text" id="nome" placeholder="Nome do Aluno" required>
                <input type="number" id="nota1" placeholder="Nota 1" step="0.1" min="0" max="10" required>
                <input type="number" id="nota2" placeholder="Nota 2" step="0.1" min="0" max="10" required>
                <button type="submit">Cadastrar</button>
            </form>
        </div>

        <!-- Tabela de Alunos -->
        <div class="card">
            <h2>Lista de Alunos</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Média</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-alunos">
                    <!-- As linhas serão inseridas via JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
